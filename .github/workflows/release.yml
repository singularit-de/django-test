name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (3.8, all,...) (only one)
        required: true
  push:
    branches:
      - 'main'
      - 'feature/*'
      - 'feat/*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [ "3.8","3.9","3.10","3.11","3.12","3.13", "3.14" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            src:
              - '${{matrix.version}}/**'
            shared:
              - 'Dockerfile'
              - 'tests/**'
              - '.github/workflows/release.yml'
      - name: Build the Python Docker image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker build ./${{matrix.version}} --tag my-temp-python-image:latest
      - name: Set actual python version
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: echo "PYTHON_VERSION=$(docker run my-temp-python-image:latest python -V 2>&1 | grep -Po '(?<=Python )(.+)')" >> $GITHUB_ENV
      - name: Build the Docker image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker build . --tag orbisk/django-test:${{env.PYTHON_VERSION}} --tag orbisk/django-test:${{matrix.version}}
      - name: Save the Docker image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker save orbisk/django-test | gzip > /tmp/django-test-${{matrix.version}}.tar.gz
      - name: Upload image artifact
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        uses: actions/upload-artifact@v4
        with:
          name: image-${{matrix.version}}
          path: /tmp/django-test-${{matrix.version}}.tar.gz
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        version: [ "3.8","3.9","3.10","3.11","3.12","3.13", "3.14" ]
        db:
          - name: mysql
            image: mysql
            engine: django.db.backends.mysql
            port: 3306
            grant: true
            options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
          - name: mysql-8
            image: mysql:8
            engine: django.db.backends.mysql
            port: 3306
            grant: true
            options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
          - name: mariadb
            image: mariadb
            engine: django.db.backends.mysql
            port: 3306
            grant: true
            options: --health-cmd="healthcheck.sh --su-mysql --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3
          - name: mariadb-10
            image: mariadb:10
            engine: django.db.backends.mysql
            port: 3306
            grant: true
            options: --health-cmd="healthcheck.sh --su-mysql --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=3
          - name: postgres
            image: postgres
            engine: django.db.backends.postgresql
            port: 5432
            options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
          - name: postgres-17
            image: postgres:17
            engine: django.db.backends.postgresql
            port: 5432
            options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
          - name: postgres-16
            image: postgres:16
            engine: django.db.backends.postgresql
            port: 5432
            options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
          - name: postgres-15
            image: postgres:15
            engine: django.db.backends.postgresql
            port: 5432
            options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5
          - name: mssql
            image: mcr.microsoft.com/mssql/server:2019-latest
            engine: mssql
            port: 1433
            user: sa
            password: yourStrong(!)Password
            # ODBC Driver 18 enables encryption by default and validates the
            # server certificate. The mssql test container ships a self-signed
            # cert, so we skip validation here.
            db_options: '{"extra_params": "TrustServerCertificate=yes"}'
            # todo: dont hardcode password
            # options: >-
            #   --health-cmd "/opt/mssql-tools/bin/sqlcmd -U sa -P yourStrong(!)Password -Q 'SELECT 1' -b -o /dev/null"
            #   --health-interval 60s
            #   --health-timeout 30s
            #   --health-start-period 20s
            #   --health-retries 3
    env:
      DB_ENGINE: ${{matrix.db.engine}}
      DB_HOST: 127.0.0.1
      DB_PORT: ${{matrix.db.port}}
      DB_NAME: test_db
      DB_USER: ${{matrix.db.user || 'test_user'}}
      DB_PASSWORD: ${{matrix.db.password || 'password'}}
      DB_OPTIONS: ${{matrix.db.db_options || '{}'}}
    services:
      # A single service container per matrix job. The env below is the
      # superset of what the mysql/mariadb/postgres/mssql images understand;
      # each image just ignores the variables it doesn't know.
      db:
        image: ${{matrix.db.image}}
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_USER: test_user
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: test_db
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_USER: test_user
          MARIADB_PASSWORD: password
          MARIADB_DATABASE: test_db
          MARIADB_MYSQL_LOCALHOST_USER: 'true'
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: password
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: yourStrong(!)Password
        ports:
          - ${{matrix.db.port}}:${{matrix.db.port}}
        options: ${{ matrix.db.options || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            src:
              - '${{matrix.version}}/**'
            shared:
              - 'Dockerfile'
              - 'tests/**'
              - '.github/workflows/release.yml'
      - name: Download image artifact
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        uses: actions/download-artifact@v4
        with:
          name: image-${{matrix.version}}
          path: /tmp
      - name: Load the Docker image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker load < /tmp/django-test-${{matrix.version}}.tar.gz
      - name: Grant database privileges
        if: matrix.db.grant && (steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version)
        run: |
          echo "GRANT ALL on *.* to '${{env.DB_USER}}';"| mysql -u root -h ${{env.DB_HOST}} --port=${{env.DB_PORT}}
      - name: Test Database
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: |
          docker run --network host -v /"$(pwd)/tests":/app -w /app \
            -e DB_ENGINE \
            -e DB_HOST \
            -e DB_PORT \
            -e DB_NAME \
            -e DB_USER \
            -e DB_PASSWORD \
            -e DB_OPTIONS \
            -e UV_SYSTEM_PYTHON=true \
            orbisk/django-test:${{matrix.version}} sh -c "cd /app && uv pip install -r requirements.txt && python manage.py test"

  push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        version: [ "3.8","3.9","3.10","3.11","3.12","3.13", "3.14" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            src:
              - '${{matrix.version}}/**'
            shared:
              - 'Dockerfile'
              - 'tests/**'
              - '.github/workflows/release.yml'
      - name: Download image artifact
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        uses: actions/download-artifact@v4
        with:
          name: image-${{matrix.version}}
          path: /tmp
      - name: Load the Docker image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker load < /tmp/django-test-${{matrix.version}}.tar.gz
      - name: Login to Docker Hub
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Image
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.shared == 'true' || github.event.inputs.version == 'all' || github.event.inputs.version == matrix.version
        run: docker push -a orbisk/django-test
